<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MORAQ M-OS v3.4 — Omni-Operating System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#050507;}
#root{height:100vh;}
#loading{position:fixed;inset:0;background:#050507;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;transition:opacity .6s;}
.ld-brand{font-family:'Playfair Display',serif;font-size:38px;letter-spacing:.1em;
  color:#D4A853;margin-bottom:6px;}
.ld-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.3em;
  text-transform:uppercase;color:#7A6228;margin-bottom:36px;}
.ld-bar{width:220px;height:2px;background:#1F1F26;border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:linear-gradient(90deg,#B8943F,#C47A1A);
  border-radius:2px;animation:ldanim 2s ease-in-out forwards;}
.ld-ver{font-family:'DM Mono',monospace;font-size:8px;color:#3A3A45;margin-top:16px;}
@keyframes ldanim{from{width:0}to{width:100%}}
</style>
</head>
<body>
<div id="loading">
  <div class="ld-brand">MORAQ</div>
  <div class="ld-sub">Omni-Operating System &nbsp;·&nbsp; v3.4</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div class="ld-ver">Initializing modules: PLM · MM · PP · QM · WM · SD · FI · SLM · DOC · SOP</div>
</div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;


/* ═══════════════════════════════════════════════════════════════
   MORAQ OMNI-OPERATING SYSTEM  v3.2
   Modules: Command · Collection · Procurement · Production ·
            Quality · Logistics · Commerce · Finance · Vendors
═══════════════════════════════════════════════════════════════ */

// ── TOKENS ──────────────────────────────────────────────────────
const C = {
  bg0:"#050507", bg1:"#0B0B0E", bg2:"#111115", bg3:"#18181D", bg4:"#1F1F26",
  bg5:"#26262F", border:"#252530", borderHi:"#38383F",
  gold:"#B8943F", goldBright:"#D4A853", goldDim:"#7A6228", goldGlow:"rgba(184,148,63,0.12)",
  amber:"#C47A1A", amberDim:"#6B4A12",
  text:"#E6E0D4", textMid:"#9C9489", textDim:"#5A5550",
  green:"#2FA869", greenDim:"#1A5C3A",
  red:"#C44040", redDim:"#5C2020",
  blue:"#3A7FC1", blueDim:"#1E4A72",
  cyan:"#1E9E8A", cyanDim:"#0F5248",
  purple:"#7A55C4", purpleDim:"#3E2A6B",
  orange:"#C46A20",
};

// ── GLOBAL CSS ───────────────────────────────────────────────────
const G = `
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:${C.bg0};color:${C.text};font-family:'DM Sans',sans-serif;font-size:13px;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:${C.bg5};border-radius:2px;}

.root{display:flex;height:100vh;overflow:hidden;position:relative;
  background:${C.bg0};
  background-image:
    radial-gradient(ellipse 1000px 700px at 15% -10%,rgba(184,148,63,.05) 0%,transparent 55%),
    radial-gradient(ellipse 600px 500px at 90% 90%,rgba(58,127,193,.04) 0%,transparent 50%);
}

/* ── SIDEBAR ── */
.sb{width:210px;min-width:210px;background:${C.bg1};border-right:1px solid ${C.border};
  display:flex;flex-direction:column;position:relative;z-index:20;overflow:hidden;}
.sb::after{content:'';position:absolute;top:0;right:-1px;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent 0%,${C.gold}55 30%,${C.gold}33 70%,transparent 100%);}

.sb-logo{padding:20px 18px 16px;border-bottom:1px solid ${C.border};}
.sb-brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;
  color:${C.goldBright};letter-spacing:.06em;line-height:1;}
.sb-tagline{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.28em;
  color:${C.goldDim};margin-top:4px;text-transform:uppercase;}
.sb-pill{display:inline-flex;align-items:center;gap:5px;margin-top:8px;
  padding:3px 8px;border-radius:20px;background:${C.bg3};border:1px solid ${C.border};}
.sb-pill-dot{width:5px;height:5px;border-radius:50%;background:${C.green};animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sb-pill-txt{font-family:'DM Mono',monospace;font-size:8px;color:${C.textDim};}

.sb-scroll{flex:1;overflow-y:auto;padding-bottom:8px;}
.sb-group{margin-top:4px;}
.sb-lbl{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.28em;text-transform:uppercase;
  color:${C.textDim};padding:12px 18px 6px;}
.nav{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;
  color:${C.textMid};font-size:11.5px;border-left:2px solid transparent;
  transition:all .12s;position:relative;}
.nav:hover{color:${C.text};background:${C.bg2};}
.nav.on{color:${C.goldBright};background:${C.bg2};border-left-color:${C.gold};}
.nav-ic{font-size:13px;width:15px;text-align:center;opacity:.7;}
.nav.on .nav-ic{opacity:1;color:${C.gold};}
.nav-badge{margin-left:auto;font-family:'DM Mono',monospace;font-size:8px;
  padding:1px 5px;border-radius:2px;}
.nav-badge.r{background:${C.redDim};color:${C.red};}
.nav-badge.g{background:${C.greenDim};color:${C.green};}
.nav-badge.a{background:${C.amberDim};color:${C.amber};}

.sb-foot{padding:12px 14px;border-top:1px solid ${C.border};}
.u-card{display:flex;align-items:center;gap:9px;padding:8px 10px;
  background:${C.bg3};border-radius:6px;border:1px solid ${C.border};
  cursor:pointer;transition:border-color .12s;}
.u-card:hover{border-color:${C.gold}55;}
.u-av{width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,${C.gold},${C.amber});
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;color:${C.bg0};}
.u-nm{font-size:11px;font-weight:500;color:${C.text};}
.u-rl{font-family:'DM Mono',monospace;font-size:8px;color:${C.gold};}
.sb-clock{font-family:'DM Mono',monospace;font-size:9px;color:${C.textDim};
  text-align:center;margin-top:8px;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

.topbar{display:flex;align-items:center;gap:12px;padding:0 24px;
  height:48px;min-height:48px;background:${C.bg1};border-bottom:1px solid ${C.border};}
.tb-crumb{display:flex;align-items:center;gap:6px;}
.tb-crumb-root{font-family:'DM Mono',monospace;font-size:9px;color:${C.textDim};}
.tb-crumb-sep{color:${C.textDim};font-size:10px;}
.tb-crumb-cur{font-family:'Playfair Display',serif;font-size:15px;font-weight:400;color:${C.text};}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tb-search{display:flex;align-items:center;gap:7px;padding:5px 12px;
  background:${C.bg3};border:1px solid ${C.border};border-radius:4px;cursor:pointer;}
.tb-search-txt{font-family:'DM Mono',monospace;font-size:10px;color:${C.textDim};}
.tb-search:hover{border-color:${C.borderHi};}
.notif-btn{position:relative;width:30px;height:30px;display:flex;align-items:center;
  justify-content:center;background:${C.bg3};border:1px solid ${C.border};border-radius:4px;cursor:pointer;}
.notif-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;
  border-radius:50%;background:${C.red};border:1px solid ${C.bg1};}

/* ── WORK AREA ── */
.work-area{flex:1;display:flex;overflow:hidden;}
.content-scroll{flex:1;overflow-y:auto;padding:20px 24px;min-width:0;}

/* ── DETAIL PANEL ── */
.dp{width:420px;min-width:420px;background:${C.bg1};border-left:1px solid ${C.border};
  display:flex;flex-direction:column;overflow:hidden;
  animation:slideIn .2s ease-out;}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.dp-header{padding:16px 20px;border-bottom:1px solid ${C.border};
  display:flex;align-items:flex-start;justify-content:space-between;background:${C.bg2};}
.dp-close{cursor:pointer;color:${C.textDim};font-size:16px;padding:0 4px;
  transition:color .12s;}
.dp-close:hover{color:${C.text};}
.dp-body{flex:1;overflow-y:auto;padding:16px 20px;}
.dp-actions{padding:14px 20px;border-top:1px solid ${C.border};
  display:flex;gap:8px;flex-wrap:wrap;}

/* ── CARDS ── */
.card{background:${C.bg2};border:1px solid ${C.border};border-radius:7px;overflow:hidden;}
.card-h{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid ${C.border};background:${C.bg3};}
.card-t{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:${C.textMid};}
.card-b{padding:16px;}

/* ── METRICS ── */
.kpi-row{display:grid;gap:12px;margin-bottom:14px;}
.kpi-row.c4{grid-template-columns:repeat(4,1fr);}
.kpi-row.c3{grid-template-columns:repeat(3,1fr);}
.kpi-row.c5{grid-template-columns:repeat(5,1fr);}
.kpi{background:${C.bg2};border:1px solid ${C.border};border-radius:6px;
  padding:14px 16px;position:relative;overflow:hidden;cursor:default;}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.kpi.gd::after{background:linear-gradient(90deg,${C.gold},transparent);}
.kpi.gr::after{background:linear-gradient(90deg,${C.green},transparent);}
.kpi.rd::after{background:linear-gradient(90deg,${C.red},transparent);}
.kpi.bl::after{background:linear-gradient(90deg,${C.blue},transparent);}
.kpi.cy::after{background:linear-gradient(90deg,${C.cyan},transparent);}
.kpi.pu::after{background:linear-gradient(90deg,${C.purple},transparent);}
.kpi.am::after{background:linear-gradient(90deg,${C.amber},transparent);}
.kpi-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.15em;
  text-transform:uppercase;color:${C.textDim};margin-bottom:6px;}
.kpi-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;
  color:${C.text};line-height:1;}
.kpi-val sup{font-family:'DM Mono',monospace;font-size:11px;color:${C.textMid};margin-left:2px;}
.kpi-sub{font-family:'DM Mono',monospace;font-size:9px;margin-top:6px;}
.kpi-sub.up{color:${C.green};} .kpi-sub.dn{color:${C.red};} .kpi-sub.nt{color:${C.textDim};}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;}
.sh-l .sh-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;
  color:${C.text};letter-spacing:.02em;}
.sh-l .sh-sub{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.15em;
  text-transform:uppercase;color:${C.textDim};margin-top:3px;}
.sh-r{display:flex;gap:8px;align-items:center;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;
  border-radius:4px;cursor:pointer;font-size:11px;font-weight:500;
  transition:all .12s;border:1px solid transparent;font-family:'DM Sans',sans-serif;}
.btn-gd{background:linear-gradient(135deg,${C.gold},${C.amber});color:${C.bg0};font-weight:600;}
.btn-gd:hover{filter:brightness(1.1);}
.btn-out{background:transparent;color:${C.textMid};border-color:${C.border};}
.btn-out:hover{color:${C.text};border-color:${C.borderHi};}
.btn-gr{background:${C.greenDim};color:${C.green};border-color:${C.green}44;}
.btn-gr:hover{background:${C.green}30;}
.btn-rd{background:${C.redDim};color:${C.red};border-color:${C.red}44;}
.btn-rd:hover{background:${C.red}30;}
.btn-bl{background:${C.blueDim};color:${C.blue};border-color:${C.blue}44;}
.btn-am{background:${C.amberDim};color:${C.amber};border-color:${C.amber}44;}
.btn-sm{padding:4px 10px;font-size:10px;}
.btn-xs{padding:2px 8px;font-size:9px;}

/* ── TAGS ── */
.t{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;
  border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;border:1px solid;}
.t-gr{background:${C.greenDim};color:${C.green};border-color:${C.green}44;}
.t-rd{background:${C.redDim};color:${C.red};border-color:${C.red}44;}
.t-gd{background:${C.goldDim};color:${C.goldBright};border-color:${C.gold}44;}
.t-bl{background:${C.blueDim};color:${C.blue};border-color:${C.blue}44;}
.t-cy{background:${C.cyanDim};color:${C.cyan};border-color:${C.cyan}44;}
.t-pu{background:${C.purpleDim};color:${C.purple};border-color:${C.purple}44;}
.t-am{background:${C.amberDim};color:${C.amber};border-color:${C.amber}44;}
.t-dm{background:${C.bg4};color:${C.textMid};border-color:${C.border};}

/* ── ALERT CHIP ── */
.alert-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:20px;font-family:'DM Mono',monospace;font-size:9px;
  background:${C.redDim};color:${C.red};border:1px solid ${C.red}30;animation:flash 3s infinite;}
@keyframes flash{0%,100%{opacity:1}60%{opacity:.7}}
.warn-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:20px;font-family:'DM Mono',monospace;font-size:9px;
  background:${C.amberDim};color:${C.amber};border:1px solid ${C.amber}30;}

/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.12em;
  text-transform:uppercase;color:${C.textDim};padding:9px 12px;text-align:left;
  border-bottom:1px solid ${C.border};background:${C.bg3};font-weight:400;
  white-space:nowrap;}
.tbl td{padding:9px 12px;font-size:11.5px;border-bottom:1px solid ${C.border}15;
  vertical-align:middle;}
.tbl tr{cursor:pointer;transition:background .1s;}
.tbl tr:hover td{background:${C.bg3};}
.tbl tr.sel td{background:${C.goldGlow};border-left:2px solid ${C.gold};}
.tbl tr:last-child td{border-bottom:none;}
.tbl td.mono{font-family:'DM Mono',monospace;font-size:10px;}
.tbl td.gd{color:${C.goldBright};}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid ${C.border};margin-bottom:16px;}
.tab{padding:9px 16px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9.5px;
  letter-spacing:.1em;text-transform:uppercase;color:${C.textMid};
  border-bottom:2px solid transparent;transition:all .12s;}
.tab:hover{color:${C.text};}
.tab.on{color:${C.goldBright};border-bottom-color:${C.gold};}

/* ── PROGRESS ── */
.bar{height:3px;background:${C.bg4};border-radius:2px;overflow:hidden;}
.bar-f{height:100%;border-radius:2px;transition:width .5s;}
.bar-tall{height:6px;}

/* ── SPEC ROW ── */
.spec{display:flex;align-items:center;justify-content:space-between;
  padding:7px 0;border-bottom:1px solid ${C.border}18;font-size:11.5px;}
.spec:last-child{border-bottom:none;}
.spec-k{color:${C.textMid};font-size:11px;}
.spec-v{font-family:'DM Mono',monospace;font-size:10.5px;color:${C.text};}

/* ── TIMELINE ── */
.tl{position:relative;padding-left:20px;}
.tl::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;
  width:1px;background:${C.border};}
.tl-item{position:relative;padding-bottom:14px;}
.tl-dot{position:absolute;left:-18px;top:3px;width:8px;height:8px;
  border-radius:50%;border:2px solid;}
.tl-when{font-family:'DM Mono',monospace;font-size:8.5px;color:${C.textDim};}
.tl-who{font-size:10px;color:${C.goldBright};font-weight:500;}
.tl-txt{font-size:11.5px;color:${C.text};margin-top:1px;}

/* ── STAGE GATE ── */
.sg-wrap{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:4px;}
.sg-step{flex:1;min-width:90px;position:relative;}
.sg-body{padding:10px 10px 10px 20px;background:${C.bg3};border:1px solid ${C.border};
  border-right:none;height:100%;display:flex;flex-direction:column;gap:4px;}
.sg-step:last-child .sg-body{border-right:1px solid ${C.border};}
.sg-step:first-child .sg-body{border-radius:5px 0 0 5px;}
.sg-step:last-child .sg-body{border-radius:0 5px 5px 0;}
.sg-body.done{background:${C.greenDim};border-color:${C.green}44;}
.sg-body.active{background:${C.goldGlow};border-color:${C.gold}55;}
.sg-body.hold{background:${C.redDim};border-color:${C.red}44;}
.sg-ic{font-size:16px;}
.sg-lbl{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;
  letter-spacing:.1em;color:${C.textMid};}
.sg-date{font-family:'DM Mono',monospace;font-size:8px;color:${C.textDim};}
.sg-arrow{position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  z-index:2;font-size:10px;color:${C.textDim};}

/* ── DONUT MINI ── */
.donut{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.donut svg{transform:rotate(-90deg);}
.donut-val{position:absolute;font-family:'DM Mono',monospace;font-size:10px;
  color:${C.text};font-weight:500;}

/* ── HEAT CELL ── */
.heat-cell{padding:6px 8px;border-radius:3px;font-family:'DM Mono',monospace;
  font-size:10px;text-align:center;cursor:default;}

/* ── DOC CHAIN ── */
.doc-chain{display:flex;align-items:center;gap:0;flex-wrap:nowrap;overflow-x:auto;}
.doc-node{padding:8px 12px;border:1px solid;border-radius:4px;
  font-family:'DM Mono',monospace;font-size:9px;white-space:nowrap;cursor:pointer;
  transition:all .12s;}
.doc-node:hover{filter:brightness(1.2);}
.doc-node.done{border-color:${C.green}44;background:${C.greenDim};color:${C.green};}
.doc-node.active{border-color:${C.gold}55;background:${C.goldGlow};color:${C.goldBright};}
.doc-node.open{border-color:${C.border};background:${C.bg4};color:${C.textDim};}
.doc-arrow{margin:0 4px;color:${C.textDim};font-size:10px;}

/* ── GRID HELPERS ── */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px;}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:14px;}
.g13{display:grid;grid-template-columns:1fr 3fr;gap:14px;}
.mb12{margin-bottom:12px;} .mb16{margin-bottom:16px;} .mb20{margin-bottom:20px;}
.mt8{margin-top:8px;} .mt12{margin-top:12px;}

/* ── INPUT ── */
.inp{background:${C.bg3};border:1px solid ${C.border};border-radius:4px;
  padding:7px 11px;font-size:11.5px;color:${C.text};outline:none;
  font-family:'DM Sans',sans-serif;transition:border-color .12s;width:100%;}
.inp:focus{border-color:${C.gold};}
.inp::placeholder{color:${C.textDim};}
select.inp{cursor:pointer;}

/* ── MODAL OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:flex;align-items:center;justify-content:center;animation:fadeIn .15s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:${C.bg1};border:1px solid ${C.border};border-radius:8px;
  width:560px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;
  animation:modalIn .2s ease-out;}
@keyframes modalIn{from{transform:scale(.96) translateY(-10px);opacity:0}to{transform:none;opacity:1}}
.modal-h{padding:16px 20px;border-bottom:1px solid ${C.border};background:${C.bg2};
  display:flex;align-items:center;justify-content:space-between;}
.modal-t{font-family:'Playfair Display',serif;font-size:16px;color:${C.text};}
.modal-b{padding:20px;overflow-y:auto;flex:1;}
.modal-f{padding:14px 20px;border-top:1px solid ${C.border};display:flex;gap:8px;justify-content:flex-end;}
.form-row{margin-bottom:14px;}
.form-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:${C.textDim};margin-bottom:5px;}

/* ── NOTIFICATION DRAWER ── */
.notif-drawer{position:absolute;right:0;top:48px;width:320px;
  background:${C.bg1};border-left:1px solid ${C.border};border-bottom:1px solid ${C.border};
  z-index:50;animation:slideDown .15s ease-out;}
@keyframes slideDown{from{transform:translateY(-10px);opacity:0}to{transform:none;opacity:1}}
.notif-item{padding:11px 16px;border-bottom:1px solid ${C.border}22;
  display:flex;gap:10px;cursor:pointer;}
.notif-item:hover{background:${C.bg2};}
.notif-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.notif-txt{font-size:11px;color:${C.text};line-height:1.4;}
.notif-time{font-family:'DM Mono',monospace;font-size:8.5px;color:${C.textDim};margin-top:2px;}

/* ── SCAN ANIMATION ── */
.live-badge{display:inline-flex;align-items:center;gap:5px;
  font-family:'DM Mono',monospace;font-size:8.5px;color:${C.green};}
.live-dot{width:5px;height:5px;border-radius:50%;background:${C.green};animation:blink 1.5s infinite;}

/* ── INFOBOX ── */
.infobox{padding:10px 14px;border-radius:5px;font-size:11px;line-height:1.5;}
.infobox.warn{background:${C.amberDim};border:1px solid ${C.amber}33;color:${C.amber};}
.infobox.err{background:${C.redDim};border:1px solid ${C.red}33;color:${C.red};}
.infobox.ok{background:${C.greenDim};border:1px solid ${C.green}33;color:${C.green};}
.infobox.info{background:${C.blueDim};border:1px solid ${C.blue}33;color:${C.blue};}

/* ── VENDOR SCORE ── */
.vscore{display:flex;align-items:center;gap:8px;}
.vscore-bar{flex:1;height:5px;background:${C.bg4};border-radius:3px;overflow:hidden;}
.vscore-fill{height:100%;border-radius:3px;}

/* ── PANTONE GRID ── */
.pt-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.pt-card{border-radius:5px;overflow:hidden;border:1px solid ${C.border};cursor:pointer;
  transition:transform .12s;}
.pt-card:hover{transform:scale(1.03);}
.pt-sw{height:56px;}
.pt-info{padding:8px;background:${C.bg3};}
.pt-code{font-family:'DM Mono',monospace;font-size:8.5px;color:${C.gold};}
.pt-name{font-size:10px;color:${C.text};margin-top:1px;}

/* ── MRP TABLE ── */
.mrp-row{display:grid;grid-template-columns:1.6fr repeat(8,1fr);
  gap:4px;padding:7px 12px;border-bottom:1px solid ${C.border}18;align-items:center;
  font-family:'DM Mono',monospace;font-size:9.5px;}
.mrp-h{background:${C.bg3};font-size:8.5px;color:${C.textDim};border-radius:4px 4px 0 0;}
.mrp-e{color:${C.goldBright};} .mrp-s{color:${C.green};} .mrp-d{color:${C.red};}
/* ── PROFILE MODAL ── */
.profile-modal{background:${C.bg1};border:1px solid ${C.border};border-radius:10px;
  width:620px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;
  animation:modalIn .2s ease-out;}
.profile-av-wrap{display:flex;flex-direction:column;align-items:center;padding:28px 0 20px;}
.profile-av-lg{width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,${C.gold},${C.amber});
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;color:${C.bg0};letter-spacing:.02em;
  box-shadow:0 0 0 3px ${C.bg1},0 0 0 5px ${C.gold}44;}
.profile-av-edit{font-family:'DM Mono',monospace;font-size:8px;color:${C.textDim};
  margin-top:6px;cursor:pointer;letter-spacing:.12em;}
.profile-av-edit:hover{color:${C.gold};}
.profile-tabs{display:flex;border-bottom:1px solid ${C.border};padding:0 20px;}
.profile-tab{padding:9px 14px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;color:${C.textMid};
  border-bottom:2px solid transparent;transition:all .12s;}
.profile-tab:hover{color:${C.text};}
.profile-tab.on{color:${C.goldBright};border-bottom-color:${C.gold};}
.profile-body{flex:1;overflow-y:auto;padding:20px;}
.pf-section{margin-bottom:20px;}
.pf-section-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;
  text-transform:uppercase;color:${C.textDim};margin-bottom:12px;
  padding-bottom:6px;border-bottom:1px solid ${C.border};}
.pf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.pf-field{display:flex;flex-direction:column;gap:5px;}
.pf-field-lbl{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.1em;
  text-transform:uppercase;color:${C.textDim};}
.pf-field-val{font-size:12px;color:${C.text};}
.pf-badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.act-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid ${C.border}15;align-items:flex-start;}
.act-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.act-time{font-family:'DM Mono',monospace;font-size:8.5px;color:${C.textDim};min-width:40px;}
.act-evt{font-size:11px;color:${C.text};}
.act-mod{font-family:'DM Mono',monospace;font-size:8px;color:${C.textMid};}
.pref-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid ${C.border}15;}
.pref-lbl{font-size:12px;color:${C.text};}
.pref-sub{font-family:'DM Mono',monospace;font-size:9px;color:${C.textDim};margin-top:2px;}
.toggle{width:36px;height:20px;border-radius:10px;cursor:pointer;position:relative;
  transition:background .15s;flex-shrink:0;}
.toggle.on{background:${C.gold};}
.toggle.off{background:${C.bg5};}
.toggle-knob{position:absolute;top:3px;width:14px;height:14px;border-radius:50%;
  background:white;transition:left .15s;}
.toggle.on .toggle-knob{left:19px;}
.toggle.off .toggle-knob{left:3px;}

/* ── HARD STOP BANNER ── */
.hardstop{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-radius:5px;background:${C.redDim};border:2px solid ${C.red}55;
  color:${C.red};font-size:11px;animation:flash 2s infinite;}
.hardstop-icon{font-size:20px;flex-shrink:0;}
.tolerance-ok{color:${C.green};}
.tolerance-warn{color:${C.amber};}
.tolerance-stop{color:${C.red};font-weight:600;}

/* ── RACI MATRIX ── */
.raci-grid{display:grid;grid-template-columns:1.5fr repeat(4,1fr);gap:0;}
.raci-head{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;
  text-transform:uppercase;color:${C.textDim};padding:8px 10px;
  background:${C.bg3};border-bottom:1px solid ${C.border};text-align:center;}
.raci-head:first-child{text-align:left;}
.raci-row-lbl{font-size:11px;color:${C.text};padding:8px 10px;
  border-bottom:1px solid ${C.border}15;}
.raci-cell{text-align:center;padding:8px 10px;border-bottom:1px solid ${C.border}15;
  font-family:'DM Mono',monospace;font-size:10px;font-weight:600;}
.raci-R{color:${C.red};}
.raci-A{color:${C.gold};}
.raci-C{color:${C.blue};}
.raci-I{color:${C.textMid};}

/* ── DRILL-DOWN CHAIN ── */
.ddchain{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:10px 14px;
  background:${C.bg3};border-radius:5px;border:1px solid ${C.border};}
.ddnode{display:flex;align-items:center;gap:5px;padding:5px 10px;
  border-radius:4px;border:1px solid;cursor:pointer;transition:all .12s;font-size:10px;}
.ddnode:hover{filter:brightness(1.2);}
.ddnode.sku{border-color:${C.gold}55;background:${C.goldGlow};color:${C.goldBright};}
.ddnode.form{border-color:${C.purple}55;background:${C.purpleDim};color:${C.purple};}
.ddnode.raw{border-color:${C.blue}55;background:${C.blueDim};color:${C.blue};}
.ddnode.wh{border-color:${C.cyan}55;background:${C.cyanDim};color:${C.cyan};}
.ddnode.sup{border-color:${C.green}55;background:${C.greenDim};color:${C.green};}
.dd-arrow{color:${C.textDim};font-size:10px;}

/* ── FORMULA VERSION CONTROL ── */
.fv-ver{display:flex;align-items:center;gap:12px;padding:10px 14px;
  border-bottom:1px solid ${C.border}18;cursor:pointer;transition:background .1s;}
.fv-ver:hover{background:${C.bg3};}
.fv-ver.current{background:${C.goldGlow};}
.fv-hash{font-family:'DM Mono',monospace;font-size:9px;color:${C.gold};min-width:90px;}
.fv-ver-tag{font-family:'DM Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;}
.fv-access-tier{padding:12px 14px;border-radius:5px;margin-bottom:8px;border:1px solid;}
.fv-access-tier.t1{border-color:${C.red}44;background:${C.redDim};}
.fv-access-tier.t2{border-color:${C.gold}44;background:${C.goldGlow};}
.fv-access-tier.t3{border-color:${C.blue}44;background:${C.blueDim};}

/* ── SLM LIFECYCLE ── */
.slm-timeline{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.slm-phase{flex:1;min-width:110px;}
.slm-phase-body{padding:10px 12px;border:1px solid ${C.border};height:100%;
  display:flex;flex-direction:column;gap:5px;border-right:none;}
.slm-phase:last-child .slm-phase-body{border-right:1px solid ${C.border};}
.slm-phase:first-child .slm-phase-body{border-radius:5px 0 0 5px;}
.slm-phase:last-child .slm-phase-body{border-radius:0 5px 5px 0;}
.slm-phase-body.done{background:${C.greenDim};border-color:${C.green}44;}
.slm-phase-body.active{background:${C.goldGlow};border-color:${C.gold}55;}
.slm-phase-body.pending{background:${C.bg3};border-color:${C.border};}
.slm-phase-body.offboard{background:${C.redDim};border-color:${C.red}44;}
.slm-phase-ic{font-size:14px;}
.slm-phase-lbl{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;
  letter-spacing:.1em;color:${C.textMid};}
.slm-phase-dt{font-family:'DM Mono',monospace;font-size:8px;color:${C.textDim};}
.slm-vendor-card{padding:14px 16px;background:${C.bg2};border:1px solid ${C.border};
  border-radius:6px;margin-bottom:10px;cursor:pointer;transition:border-color .12s;}
.slm-vendor-card:hover{border-color:${C.gold}44;}

/* ── SUBSTITUTE MATERIALS ── */
.sub-row{display:flex;align-items:center;gap:10px;padding:9px 14px;
  border-bottom:1px solid ${C.border}15;cursor:pointer;transition:background .1s;}
.sub-row:hover{background:${C.bg3};}
.sub-arrow{color:${C.textDim};font-size:10px;}

/* ── COST CENTER INTEGRATION ── */
.cogs-strip{display:flex;align-items:center;gap:16px;padding:12px 16px;
  background:linear-gradient(135deg,${C.bg3},${C.bg2});
  border:1px solid ${C.gold}33;border-radius:5px;margin-bottom:12px;}
.cogs-item{display:flex;flex-direction:column;gap:3px;}
.cogs-lbl{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;
  letter-spacing:.1em;color:${C.textDim};}
.cogs-val{font-family:'Playfair Display',serif;font-size:18px;color:${C.goldBright};}
.cogs-sep{width:1px;height:36px;background:${C.border};}

/* ══════════════════════════════════════════════
   FILE VIEWER MODAL
══════════════════════════════════════════════ */
.fv-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;
  display:flex;flex-direction:column;animation:fadeIn .15s;}
.fv-toolbar{height:48px;min-height:48px;background:${C.bg1};border-bottom:1px solid ${C.border};
  display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0;}
.fv-toolbar-title{font-family:'Playfair Display',serif;font-size:15px;color:${C.text};flex:1;}
.fv-toolbar-meta{font-family:'DM Mono',monospace;font-size:9px;color:${C.textDim};}
.fv-toolbar-acts{display:flex;gap:8px;align-items:center;}
.fv-body{flex:1;overflow-y:auto;background:${C.bg0};padding:28px;display:flex;justify-content:center;}

/* Document sheet */
.fv-sheet{background:#f8f5f0;border-radius:4px;width:100%;max-width:860px;
  min-height:100%;box-shadow:0 4px 40px rgba(0,0,0,.5);color:#1a1a1a;
  font-family:'DM Sans',sans-serif;overflow:hidden;}
.fv-sheet-dark{background:${C.bg2};border:1px solid ${C.border};color:${C.text};}

/* Tech-Pack document */
.tp-header{background:#1a1a1a;padding:28px 32px;display:flex;align-items:center;gap:20px;}
.tp-brand{font-family:'Playfair Display',serif;font-size:26px;color:#D4A853;letter-spacing:.06em;}
.tp-doc-title{font-size:11px;color:#888;letter-spacing:.2em;text-transform:uppercase;margin-top:4px;}
.tp-body{padding:32px;}
.tp-section{margin-bottom:24px;}
.tp-section-title{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#888;
  border-bottom:1px solid #ddd;padding-bottom:6px;margin-bottom:12px;}
.tp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 20px;}
.tp-field{display:flex;flex-direction:column;gap:3px;}
.tp-field-lbl{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.1em;}
.tp-field-val{font-size:12px;color:#1a1a1a;font-weight:500;}
.tp-swatch-row{display:flex;gap:10px;margin-top:8px;}
.tp-swatch{width:40px;height:40px;border-radius:4px;border:1px solid #ddd;}
.tp-bom-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.tp-bom-tbl th{background:#f0ece6;padding:7px 10px;text-align:left;
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#666;border-bottom:1px solid #ddd;}
.tp-bom-tbl td{padding:7px 10px;border-bottom:1px solid #eee;color:#1a1a1a;}
.tp-bom-tbl tr:last-child td{border-bottom:none;}
.tp-sketch{background:#f0ece6;border-radius:4px;padding:20px;display:flex;align-items:center;justify-content:center;min-height:200px;}

/* Pattern DXF viewer */
.dxf-viewer{background:#0a0f1a;padding:24px;display:flex;justify-content:center;align-items:flex-start;min-height:500px;}
.dxf-svg{background:#0d1220;border:1px solid #1e3050;border-radius:4px;padding:16px;}
.dxf-layer-panel{background:${C.bg2};padding:12px 16px;border-top:1px solid ${C.border};}

/* SOP Document viewer */
.sop-doc{padding:32px;}
.sop-doc-header{display:flex;justify-content:space-between;align-items:flex-start;
  border-bottom:3px solid #1a1a1a;padding-bottom:16px;margin-bottom:24px;}
.sop-doc-title{font-family:'Playfair Display',serif;font-size:22px;color:#1a1a1a;}
.sop-doc-meta-box{background:#f0ece6;border:1px solid #ddd;border-radius:4px;
  padding:10px 14px;font-size:10px;color:#666;min-width:180px;}
.sop-step-wrap{margin-bottom:20px;}
.sop-step-num{width:28px;height:28px;border-radius:50%;background:#1a1a1a;color:#D4A853;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  flex-shrink:0;font-family:'DM Mono',monospace;}
.sop-step-body{flex:1;}
.sop-step-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:4px;}
.sop-step-desc{font-size:11.5px;color:#444;line-height:1.6;}
.sop-substep{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #eee;font-size:11px;color:#555;}
.sop-substep:last-child{border-bottom:none;}
.sop-warning{background:#fff3cd;border:1px solid #ffc107;border-radius:4px;
  padding:8px 12px;font-size:11px;color:#856404;margin-top:8px;}
.sop-critical{background:#f8d7da;border:1px solid #f5c2c7;border-radius:4px;
  padding:8px 12px;font-size:11px;color:#842029;margin-top:8px;}
.sop-note{background:#d1ecf1;border:1px solid #bee5eb;border-radius:4px;
  padding:8px 12px;font-size:11px;color:#0c5460;margin-top:8px;}

/* BOM Report */
.bom-rpt{padding:28px;}
.bom-rpt-header{background:#1a1a1a;color:#D4A853;padding:16px 20px;
  margin:-28px -28px 24px;display:flex;justify-content:space-between;align-items:center;}
.bom-rpt-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.bom-rpt-tbl th{background:#f0ece6;padding:8px 12px;text-align:left;
  font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#555;border-bottom:2px solid #ddd;}
.bom-rpt-tbl td{padding:8px 12px;border-bottom:1px solid #eee;color:#1a1a1a;}
.bom-rpt-total{background:#1a1a1a;color:#D4A853;padding:10px 12px;font-weight:700;font-size:12px;}

/* Guideline document */
.gl-doc{padding:32px;}
.gl-section{margin-bottom:28px;}
.gl-section-title{font-family:'Playfair Display',serif;font-size:16px;color:#1a1a1a;
  border-bottom:2px solid #D4A853;padding-bottom:8px;margin-bottom:14px;}
.gl-rule{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #eee;font-size:12px;}
.gl-rule-num{font-family:'DM Mono',monospace;font-size:9px;color:#D4A853;min-width:28px;margin-top:2px;}
.gl-checklist-item{display:flex;gap:10px;padding:7px 12px;border-bottom:1px solid #eee;
  font-size:11.5px;align-items:center;}
.gl-check{width:16px;height:16px;border:1.5px solid #888;border-radius:3px;
  display:flex;align-items:center;justify-content:center;font-size:10px;color:green;flex-shrink:0;}

/* ══════════════════════════════════════════════
   SOP LIBRARY
══════════════════════════════════════════════ */
.sop-lib-card{background:${C.bg2};border:1px solid ${C.border};border-radius:7px;
  padding:14px 16px;cursor:pointer;transition:all .12s;position:relative;overflow:hidden;}
.sop-lib-card:hover{border-color:${C.gold}44;background:${C.bg3};}
.sop-lib-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.sop-lib-card.cat-prod::before{background:${C.blue};}
.sop-lib-card.cat-qc::before{background:${C.green};}
.sop-lib-card.cat-frag::before{background:${C.purple};}
.sop-lib-card.cat-design::before{background:${C.gold};}
.sop-lib-card.cat-pkg::before{background:${C.cyan};}
.sop-cat-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;
  border-radius:2px;font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;
  letter-spacing:.1em;}
.sop-cat-prod{background:${C.blueDim};color:${C.blue};}
.sop-cat-qc{background:${C.greenDim};color:${C.green};}
.sop-cat-frag{background:${C.purpleDim};color:${C.purple};}
.sop-cat-design{background:${C.goldDim};color:${C.goldBright};}
.sop-cat-pkg{background:${C.cyanDim};color:${C.cyan};}

/* ══════════════════════════════════════════════
   DOCUMENT LIBRARY
══════════════════════════════════════════════ */
.doc-lib-card{background:${C.bg2};border:1px solid ${C.border};border-radius:7px;
  overflow:hidden;cursor:pointer;transition:all .12s;}
.doc-lib-card:hover{border-color:${C.gold}44;transform:translateY(-1px);}
.doc-lib-thumb{height:80px;background:${C.bg4};display:flex;align-items:center;
  justify-content:center;font-size:36px;position:relative;overflow:hidden;}
.doc-lib-thumb-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,${C.bg3}88);}
.doc-lib-info{padding:10px 12px;}
.doc-lib-name{font-size:11.5px;font-weight:500;color:${C.text};margin-bottom:3px;}
.doc-lib-meta{font-family:'DM Mono',monospace;font-size:8px;color:${C.textDim};}
.doc-lib-type{position:absolute;top:6px;right:6px;font-family:'DM Mono',monospace;
  font-size:8px;padding:2px 5px;border-radius:2px;background:${C.bg1}cc;color:${C.gold};}

/* Interactive SOP execution */
.sop-exec-step{display:flex;gap:12px;padding:11px 14px;border-bottom:1px solid ${C.border}18;
  cursor:pointer;transition:background .1s;border-radius:4px;}
.sop-exec-step:hover{background:${C.bg3};}
.sop-exec-step.done{opacity:.75;}
.sop-exec-check{width:20px;height:20px;border-radius:4px;border:1.5px solid;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  margin-top:1px;transition:all .15s;}
.sop-exec-check.done{border-color:${C.green};background:${C.green}22;}
.sop-exec-check.pending{border-color:${C.borderHi};background:transparent;}
.sop-exec-check.critical{border-color:${C.red};}
.sop-exec-ref{font-family:'DM Mono',monospace;font-size:8.5px;padding:1px 6px;
  border-radius:2px;background:${C.bg4};color:${C.textDim};cursor:pointer;}

const Tag = ({c,children})=><span className={`t t-${c}`}>{children}</span>;
const Btn = ({v,c="out",sm,xs,onClick,children})=><button className={`btn btn-${c}${sm?" btn-sm":""}${xs?" btn-xs":""} `} onClick={onClick}>{children}</button>;
const Kpi = ({lbl,val,sup,sub,dir,accent})=>(
  <div className={`kpi ${accent}`}>
    <div className="kpi-lbl">{lbl}</div>
    <div className="kpi-val">{val}{sup&&<sup>{sup}</sup>}</div>
    {sub&&<div className={`kpi-sub ${dir||"nt"}`}>{dir==="up"?"↑":dir==="dn"?"↓":""} {sub}</div>}
  </div>
);
const Bar = ({v,max=100,col,tall})=>(
  <div className={`bar${tall?" bar-tall":""}`}>
    <div className="bar-f" style={{width:`${Math.min(100,(v/max)*100)}%`,background:col||C.gold}}/>
  </div>
);
const SevTag = ({v})=>{
  const m={ACCEPT:"gr",REJECT:"rd",PASS:"gr",FAIL:"rd",WARN:"am",Advisory:"am","Stop-Shipment":"rd",OK:"gr",Critical:"rd","IR Posted":"gr","GR Done":"cy","PO Sent":"bl","PR Open":"dm","In Progress":"gd","QC Hold":"rd",Complete:"gr","Pre-Production":"bl","Active":"gr",Sample:"am",Production:"bl",Shipped:"gr",Delivered:"gr","Awaiting Stock":"am",Posted:"cy",Pending:"dm",Done:"gr",Priority:"gd",Reserved:"pu",Standard:"bl",Valid:"gr",Expiring:"am",Expired:"rd",Open:"am",Closed:"gr",Connected:"gr",Approved:"gr","In Review":"am",Hold:"rd",Executed:"gr",Delayed:"rd","On Track":"gr"};
  return <Tag c={m[v]||"dm"}>{v}</Tag>;
};
const DocNode = ({lbl,id,status,onClick})=>(
  <div className={`doc-node ${status}`} onClick={onClick}>
    <div style={{fontSize:"8px",opacity:.7}}>{lbl}</div>
    <div style={{marginTop:2}}>{id||"—"}</div>
  </div>
);
function Donut({pct,size=48,stroke=5,color}){
  const r=size/2-stroke;const circ=2*Math.PI*r;const off=circ-(pct/100)*circ;
  return(
    <div className="donut" style={{width:size,height:size}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.bg4} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color||C.gold} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"/>
      </svg>
      <div className="donut-val">{pct}%</div>
    </div>
  );
}

              {["Notify QM Manager and R&D Lead immediately","Issue NCR against supplier batch (Maison Grasse SARL)","Investigate root cause: supplier formula / dilution error vs. internal weighing error","Collect 3 additional samples for re-test to confirm result","Production Order PRD-000824 locked — do not proceed to filling"].map((a,i)=>(
                <div key={i} style={{fontSize:11,color:"#842029",marginBottom:4}}>• {a}</div>

    }

    if(type==="dispatch"){
      return(
        <div className="fv-sheet fv-sheet-dark">
          <div style={{padding:"20px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>

            <Tag c="rd" style={{marginLeft:"auto"}}>AES-256 ENCRYPTED</Tag>
          </div>
          <div style={{padding:"24px"}}>
            <div className="infobox err mb16">Access logged: T.Kiên (ADMIN) · {new Date().toLocaleString("vi-VN")} · Audit record created</div>
            {[["Formula ID","FORM-007"],["Version","v3.1"],["Product","No.7 Eau de Parfum (EDP 20%)"],["Batch Size","480g concentrate"],["Carrier Volume","2,400ml"],["Fixative","8ml"],["Process Temperature","22°C ±1°C"],["Mixing Speed","45 RPM"],["Maceration Duration","48 hours"],["Target Concentration","20.0% ±0.5%"],["IFRA Compliance","Certified 2024"]].map(([k,v])=>(

              <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:C.textDim,marginBottom:8,letterSpacing:".15em",textTransform:"uppercase"}}>Sequence Instructions (Encoded)</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:C.text,lineHeight:1.8}}>
                Step 1: Add carrier → Mix 5 min at 20 RPM<br/>
                Step 2: Add concentrate slowly (over 3 min) → Mix 15 min at 45 RPM<br/>
                Step 3: Add fixative → Mix 10 min at 45 RPM<br/>
                Step 4: pH check → adjust if needed<br/>
                Step 5: Transfer to maceration vessel → nitrogen blanket → seal<br/>
                Step 6: Rest 48h → QC sample → concentration check
              </div>
            </div>
          </div>
        </div>
      );
    }

    return <div className="fv-sheet" style={{padding:40,color:"#1a1a1a"}}>Document preview not available for this type.</div>;
  };

  return(
    <div className="fv-overlay" onClick={onClose}>
      <div className="fv-toolbar" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:18}}>{resolvedDoc?.icon||"📄"}</span>
          <div>
            <div className="fv-toolbar-title">{resolvedDoc?.name}</div>
            <div className="fv-toolbar-meta">{resolvedDoc?.ext} · {resolvedDoc?.ver} · {resolvedDoc?.size} · {resolvedDoc?.date}</div>
          </div>
        </div>
        <div className="fv-toolbar-acts">
          <SevTag v={resolvedDoc?.status||"Approved"}/>
          <Btn c="out" sm onClick={()=>addToast&&addToast(`${resolvedDoc?.name} — download initiated`,"ok")}>↓ Download</Btn>

          <Btn c="rd" sm onClick={onClose}>✕ Close</Btn>
        </div>
      </div>
      <div className="fv-body" onClick={e=>e.stopPropagation()}>
        {renderContent()}
      </div>
    </div>
  );
}

  if(type==="ncr"){
    title="NCR "+data.ncr; sub=data.cls+" · "+data.il;
    actions=[<Btn c="gr" sm key="c">Close NCR</Btn>,<Btn c="am" sm key="ca">CAPA Update</Btn>,<Btn c="out" sm key="p">Print Report</Btn>];
    body=(
      <div>
        {data.status==="Open"&&<div className="infobox err mb12">Open NCR — CAPA required by {data.capa}.</div>}
        {[["NCR #",data.ncr],["Inspection Lot",data.il],["Class",<Tag c={data.cls==="Critical"?"rd":data.cls==="Major"?"am":"gd"} key="c">{data.cls}</Tag>],["Description",data.desc],["Disposition",data.disp],["Root Cause",data.rc],["CAPA Due",data.capa],["Status",<SevTag key="s" v={data.status}/>]].map(([k,v])=>(
          <div key={k} className="spec"><span className="spec-k">{k}</span><span className="spec-v" style={{fontSize:10}}>{v}</span></div>
        ))}
      </div>
    );
  }

  if(type==="raci"){
    title="RACI Matrix"; sub=`${data.styleId} · ${data.name}`;
    const raciData=D.raci[data.styleId];
    actions=[<Btn c="out" sm key="exp">Export RACI</Btn>];
    body=(
      <div>
        <div className="infobox info mb12">
          Ma trận RACI xác định trách nhiệm cho từng quyết định liên quan đến SKU này. <strong>R</strong>=Responsible · <strong>A</strong>=Accountable · <strong>C</strong>=Consulted · <strong>I</strong>=Informed
        </div>
        {raciData?(
          <div>
            <div className="raci-grid" style={{borderRadius:5,overflow:"hidden",border:`1px solid ${C.border}`}}>
              <div className="raci-head">Task</div>
              <div className="raci-head">R</div>
              <div className="raci-head">A</div>
              <div className="raci-head">C</div>
              <div className="raci-head">I</div>
              {raciData.tasks.map((t,i)=>(
                <React.Fragment key={i}>
                  <div className="raci-row-lbl">{t.task}</div>
                  {["R","A","C","I"].map(role=>(
                    <div key={role} className={`raci-cell raci-${role}`}>{t[role]?.split(" ")[0]}</div>
                  ))}
                </React.Fragment>
              ))}
            </div>
            <div className="mt12">
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:C.textDim,marginBottom:8,textTransform:"uppercase",letterSpacing:".12em"}}>Workload Allocation</div>
              {[["Head Designer","Design & Approval","High"],["PLM Lead","BOM & Formula","High"],["Production Mgr","Production Release","Medium"],["QC Lead","Quality Sign-off","Medium"],["Finance","Cost Approval","Low"]].map(([role,scope,load])=>(
                <div key={role} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.border}18`}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:C.text}}>{role}</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:C.textDim}}>{scope}</div>
                  </div>
                  <Tag c={load==="High"?"rd":load==="Medium"?"am":"gr"}>{load}</Tag>
                </div>
              ))}
            </div>
          </div>
        ):(
          <div className="infobox warn">RACI matrix chưa được thiết lập cho SKU này. Click để tạo mới.</div>
        )}
      </div>
    );
  }

  if(type==="drilldown"){
    title="Drill-Down Chain"; sub=`${data.id} · End-to-End Traceability`;
    actions=[<Btn c="gd" sm key="trace">Full Traceability Report</Btn>];
    const formulaId=data.cat.includes("Frag")?"FORM-007":null;
    body=(
      <div>
        <div className="infobox info mb12">
          Click từng node để đi sâu vào dữ liệu gốc. Đây là chuỗi truy xuất xuyên suốt từ SKU xuống tận Nhà cung cấp (Single Source of Truth).
        </div>

        {/* DRILL DOWN CHAIN */}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
          <div className="ddchain">
            <div className="ddnode sku">🎨 SKU: {data.id}</div>
          </div>
          <div style={{paddingLeft:24,display:"flex",flexDirection:"column",gap:8}}>
            {formulaId&&(
              <div className="ddchain">
                <span className="dd-arrow">↳</span>
                <div className="ddnode form">🔒 Formula: {formulaId} (v3.1)</div>
                <span className="dd-arrow">→</span>
                <div className="ddnode raw">📦 Raw Materials: 5 components</div>
              </div>
            )}
            {!formulaId&&(
              <div className="ddchain">
                <span className="dd-arrow">↳</span>
                <div className="ddnode raw">📦 BOM: {data.comp} · {data.gsm||"—"}GSM</div>
                <span className="dd-arrow">→</span>
                <div className="ddnode raw">🪡 Mat: MAT-2025000x</div>
              </div>
            )}
          </div>
        </div>

        {/* MATERIAL → WAREHOUSE → SUPPLIER CHAIN */}
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:C.textDim,marginBottom:10,textTransform:"uppercase",letterSpacing:".12em"}}>Material → Warehouse → Supplier</div>
        {[
          {mat:"MAT-20250001",name:data.comp||"Fabric",wh:"WH-0001",batch:"BAT-2025-0821",sup:"Fratelli Tallia SpA",supId:"V-1000",po:"PO-4500891"},
          {mat:"MAT-20250002",name:"Lining / Secondary",wh:"WH-0001",batch:"BAT-2025-0808",sup:"Suzhou Silk Co. Ltd.",supId:"V-1001",po:"PO-4500854"},
        ].map((row,i)=>(
          <div key={i} style={{marginBottom:10,padding:"10px 12px",background:C.bg3,borderRadius:5,border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,flexWrap:"wrap"}}>
              <div className="ddnode raw" style={{fontSize:9}}>📦 {row.mat}</div>
              <span className="dd-arrow">→</span>
              <div className="ddnode wh" style={{fontSize:9}}>🏪 {row.wh} · {row.batch}</div>
              <span className="dd-arrow">→</span>
              <div className="ddnode sup" style={{fontSize:9}}>🏭 {row.supId}</div>
            </div>
            <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
              {[["Material",row.mat],["Name",row.name],["Warehouse",row.wh],["Batch",row.batch],["Supplier",row.sup],["PO Ref",row.po]].map(([k,v])=>(
                <div key={k} style={{display:"flex",flexDirection:"column",gap:2}}>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:C.textDim}}>{k}</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:C.gold}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    );
  }

  return(
    <div className="dp">
      <div className="dp-header">
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:C.text}}>{title}</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:C.gold,marginTop:3}}>{sub}</div>
        </div>
        <div className="dp-close" onClick={onClose}>✕</div>
      </div>
      <div className="dp-body">{body}</div>
      {actions.length>0&&<div className="dp-actions">{actions}</div>}
    </div>
  );
}

// ── SOP INTERACTIVE PANEL ──────────────────────────────────────

// ══════════════════════════════════════════════════════════════════
//  SOP LIBRARY — Full interactive SOP browser + executor
// ══════════════════════════════════════════════════════════════════
function SOPLibrary({openFile, addToast}){
  const [selSop, setSelSop] = useState(null);
  const [execSteps, setExecSteps] = useState({});
  const [filterCat, setFilterCat] = useState("all");
  const [search, setSearch] = useState("");

  const catLabels={prod:"Production",frag:"Fragrance",qc:"Quality",design:"Design",pkg:"Packaging"};
  const catColors={prod:C.blue,frag:C.purple,qc:C.green,design:C.gold,pkg:C.cyan};

  const filtered = D.sops.filter(s=>{
    const matchCat = filterCat==="all" || s.cat===filterCat;
    const matchSearch = !search || s.title.toLowerCase().includes(search.toLowerCase()) || s.id.toLowerCase().includes(search.toLowerCase()) || s.wc.toLowerCase().includes(search.toLowerCase());
    return matchCat && matchSearch;
  });

  const getExecSteps = (sopId) => {
    if(!execSteps[sopId]){
      const sop = D.sops.find(s=>s.id===sopId);
      if(!sop) return [];
      return sop.steps.map((st,i)=>({...st, done:false, by:null, ts:null}));
    }
    return execSteps[sopId];
  };

  const toggleStep = (sopId, stepIdx) => {
    const now = new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});
    setExecSteps(prev=>{
      const cur = prev[sopId] || getExecSteps(sopId);
      const updated = cur.map((s,i)=>i===stepIdx?{...s,done:!s.done,by:!s.done?"Operator "+now:null,ts:!s.done?now:null}:s);
      return {...prev,[sopId]:updated};
    });
  };

  const docForSop = (sop) => {
    const map={"SOP-CUT-001":"DOC-003","SOP-FRAG-001":"DOC-006","SOP-QC-001":"DOC-012"};
    return D.documents.find(d=>d.id===map[sop.id]);
  };

  if(selSop){
    const sop = D.sops.find(s=>s.id===selSop);
    if(!sop) return null;
    const steps = getExecSteps(selSop);
    const doneCount = steps.filter(s=>s.done).length;
    const pct = Math.round((doneCount/steps.length)*100);
    const canAdvance = doneCount===steps.length;
    const col = catColors[sop.cat];

    return(
      <div>
        {/* BACK + HEADER */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <Btn c="out" sm onClick={()=>setSelSop(null)}>← Back to Library</Btn>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:C.text}}>{sop.title}</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:C.textDim,marginTop:2}}>
              {sop.id} · {sop.ver} · {sop.wc} · {sop.author}
            </div>
          </div>
          <Tag c={sop.status==="Approved"?"gr":"am"}>{sop.status}</Tag>
          <span className={`sop-cat-badge sop-cat-${sop.cat}`}>{catLabels[sop.cat]}</span>
          {docForSop(sop)&&<Btn c="bl" sm onClick={()=>openFile&&openFile(docForSop(sop))}>📄 Full SOP Document</Btn>}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:14}}>
          {/* LEFT: INTERACTIVE EXECUTION CHECKLIST */}
          <div>
            {/* PROGRESS BAR */}
            <div className="card mb12">
              <div className="card-h">
                <div className="card-t">Execution Checklist — {sop.id}</div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:col}}>{doneCount}/{steps.length} steps</span>
                  <div style={{width:120}}>
                    <Bar v={pct} col={canAdvance?C.green:col} tall/>
                  </div>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:canAdvance?C.green:C.textMid}}>{pct}%</span>
                </div>
              </div>
              <div>
                {steps.map((step,i)=>(
                  <div key={i} className={`sop-exec-step ${step.done?"done":""}`}
                       onClick={()=>toggleStep(selSop,i)}>
                    <div className={`sop-exec-check ${step.done?"done":step.critical?"critical":"pending"}`}>
                      {step.done&&<span style={{color:C.green,fontSize:12,fontWeight:700}}>✓</span>}
                      {!step.done&&step.critical&&<span style={{color:C.red,fontSize:10}}>!</span>}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:col,minWidth:24}}>{step.n}.</span>
                        <span style={{fontSize:12,fontWeight:500,color:step.done?C.textMid:C.text,textDecoration:step.done?"line-through":"none"}}>{step.title}</span>
                        {step.critical&&!step.done&&<Tag c="rd">CRITICAL</Tag>}
                        {step.done&&<Tag c="gr">Done</Tag>}
                      </div>
                      {!step.done&&(
                        <div style={{fontSize:11,color:C.textMid,paddingLeft:24,marginBottom:4}}>{step.desc}</div>
                      )}
                      {step.done&&step.by&&(
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:C.textDim,paddingLeft:24}}>Confirmed by {step.by}</div>
                      )}
                      {/* SUB-STEPS (expand on hover) */}
                      {!step.done&&step.subs&&step.subs.length>0&&(
                        <div style={{paddingLeft:24,marginTop:6,borderLeft:`2px solid ${col}33`}}>
                          {step.subs.map((sub,j)=>(
                            <div key={j} style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:C.textDim,padding:"3px 0 3px 8px",borderBottom:`1px solid ${C.border}18`}}>
                              {String.fromCharCode(97+j)}. {sub}
                            </div>
                          ))}
                        </div>
                      )}
                      {!step.done&&step.warning&&(
                        <div style={{marginLeft:24,marginTop:6,padding:"6px 10px",background:C.redDim,border:`1px solid ${C.red}33`,borderRadius:4,fontSize:10,color:C.red}}>
                          ⚠ {step.warning}
                        </div>
                      )}
                      {!step.done&&step.note&&(
                        <div style={{marginLeft:24,marginTop:6,padding:"6px 10px",background:C.blueDim,border:`1px solid ${C.blue}33`,borderRadius:4,fontSize:10,color:C.blue}}>
                          ℹ {step.note}
                        </div>
                      )}
                    </div>
                    <div style={{display:"flex",gap:4,flexShrink:0}}>
                      {sop.refs&&sop.refs.map(r=>(
                        <span key={r} className="sop-exec-ref" onClick={e=>{e.stopPropagation();addToast&&addToast(`Reference: ${r} opened`,"ok");}}>{r.split("-")[0]}</span>
                      )).slice(0,2)}
                    </div>
                  </div>
                ))}
              </div>
              {/* GATE DECISION */}
              <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`}}>
                <div className={canAdvance?"infobox ok":"infobox warn"}>
                  {canAdvance
                    ?"✅ Tất cả bước đã hoàn thành. Stage có thể chuyển tiếp. Click Advance để confirm trong SAP PP."
                    :`${steps.filter(s=>!s.done).length} bước chưa hoàn thành. ${steps.filter(s=>!s.done&&s.critical).length} bước CRITICAL còn lại.`}
                </div>
                {canAdvance&&(
                  <div style={{marginTop:8,display:"flex",gap:8}}>
                    <Btn c="gr" onClick={()=>{addToast&&addToast(`${sop.id} — Stage advanced & confirmed in SAP PP`,"ok");setSelSop(null);}}>
                      ✓ Advance Stage in SAP PP
                    </Btn>
                    <Btn c="out" sm onClick={()=>addToast&&addToast("SOP completion record printed","ok")}>🖨 Print Record</Btn>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* RIGHT: METADATA + ATTACHMENTS + SAFETY */}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {/* METADATA */}
            <div className="card">
              <div className="card-h"><div className="card-t">SOP Info</div></div>
              <div className="card-b">
                {[["SOP ID",sop.id],["Version",sop.ver],["Work Center",sop.wc],["Issued",sop.date],["Author",sop.author],["Scope",sop.scope]].map(([k,v])=>(
                  <div key={k} className="spec" style={{padding:"6px 0"}}>
                    <span className="spec-k">{k}</span>
                    <span className="spec-v" style={{fontSize:9.5,maxWidth:160,textAlign:"right"}}>{v}</span>
                  </div>
                ))}
                <div style={{marginTop:8,display:"flex",gap:5,flexWrap:"wrap"}}>
                  {sop.refs.map(r=><Tag c="dm" key={r}>{r}</Tag>)}
                </div>
              </div>
            </div>

            {/* SAFETY */}
            {sop.safetyNotes.length>0&&(
              <div className="card">
                <div className="card-h"><div className="card-t">⚠ Safety Requirements</div><Tag c="rd">Mandatory</Tag></div>
                <div className="card-b">
                  {sop.safetyNotes.map((n,i)=>(
                    <div key={i} style={{display:"flex",gap:8,padding:"5px 0",borderBottom:`1px solid ${C.border}18`,fontSize:11}}>
                      <span style={{color:C.red,flexShrink:0}}>•</span>
                      <span style={{color:C.text}}>{n}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ATTACHMENTS */}
            <div className="card">
              <div className="card-h"><div className="card-t">Attachments & References</div></div>
              <div className="card-b" style={{padding:"8px 16px"}}>
                {sop.attachments.map(a=>{
                  const relDoc = D.documents.find(d=>d.name.includes(a.split(".")[0].replace(/-/g," ").substring(0,12)));
                  return(
                    <div key={a} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.border}18`,cursor:"pointer"}}
                         onClick={()=>relDoc?openFile&&openFile(relDoc):addToast&&addToast(`${a} opened`,"ok")}>
                      <span style={{fontSize:14}}>{a.endsWith(".pdf")?"📄":a.endsWith(".xlsx")?"📊":a.endsWith(".dxf")?"📐":"📁"}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10.5,color:C.text}}>{a}</div>
                        {relDoc&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:C.gold,marginTop:1}}>Available in Document Library</div>}
                      </div>
                      <Btn xs c={relDoc?"bl":"out"} onClick={e=>{e.stopPropagation();relDoc?openFile&&openFile(relDoc):addToast&&addToast(`${a} download started`,"ok");}}>
                        {relDoc?"👁":"↓"}
                      </Btn>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── SOP LIBRARY OVERVIEW ──
  return(
    <div>
      <div className="sh mb16">
        <div className="sh-l">
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:C.text}}>SOP Library</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,letterSpacing:".15em",textTransform:"uppercase",color:C.textDim,marginTop:3}}>
            {D.sops.length} SOPs · Self-Service · Click any SOP to execute interactively
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input className="inp" placeholder="Search SOP…" style={{maxWidth:180}} value={search} onChange={e=>setSearch(e.target.value)}/>
          <Btn c="out" sm onClick={()=>addToast&&addToast("SOP upload dialog opened","ok")}>↑ New SOP</Btn>
        </div>
      </div>

      {/* CATEGORY FILTER PILLS */}
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        {[["all","All SOPs"],["prod","Production"],["frag","Fragrance"],["qc","Quality"],["design","Design"],["pkg","Packaging"]].map(([k,lbl])=>(
          <div key={k} onClick={()=>setFilterCat(k)} style={{padding:"4px 12px",borderRadius:20,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9,border:`1px solid`,
            borderColor:filterCat===k?catColors[k]||C.gold:C.border,
            background:filterCat===k?(catColors[k]||C.gold)+"22":"transparent",
            color:filterCat===k?catColors[k]||C.gold:C.textMid}}>
            {lbl}
          </div>
        ))}
      </div>

      {/* KPI ROW */}
      <div className="kpi-row c5 mb16">
        <Kpi lbl="Total SOPs" val={D.sops.length} sub="All approved" accent="gd"/>
        <Kpi lbl="Production" val={D.sops.filter(s=>s.cat==="prod").length} sub="Plant 1000" accent="bl"/>
        <Kpi lbl="Fragrance" val={D.sops.filter(s=>s.cat==="frag").length} sub="Plant 2000" accent="pu"/>
        <Kpi lbl="Quality" val={D.sops.filter(s=>s.cat==="qc").length} sub="QM Module" accent="gr"/>
        <Kpi lbl="Design / Pkg" val={D.sops.filter(s=>s.cat==="design"||s.cat==="pkg").length} sub="PLM + Ops" accent="cy"/>
      </div>

      {/* SOP CARDS GRID */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        {filtered.map(sop=>{
          const steps = getExecSteps(sop.id);
          const doneCount = steps.filter(s=>s.done).length;
          const pct = Math.round((doneCount/steps.length)*100);
          const col = catColors[sop.cat];
          const doc = docForSop(sop);
          return(
            <div key={sop.id} className={`sop-lib-card cat-${sop.cat}`}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:8}}>
                <div>
                  <span className={`sop-cat-badge sop-cat-${sop.cat}`}>{catLabels[sop.cat]}</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:C.textDim,marginLeft:8}}>{sop.id}</span>
                </div>
                <Tag c={sop.status==="Approved"?"gr":"am"}>{sop.status}</Tag>
              </div>
              <div style={{fontSize:13,fontWeight:500,color:C.text,marginBottom:5,lineHeight:1.3}}>{sop.title}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:C.textDim,marginBottom:10}}>
                {sop.wc} · {sop.ver} · {sop.author} · {sop.date}
              </div>
              {/* PROGRESS */}
              {pct>0&&(
                <div style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:C.textDim}}>Execution progress</span>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:col}}>{doneCount}/{steps.length} · {pct}%</span>
                  </div>
                  <Bar v={pct} col={pct===100?C.green:col} tall/>
                </div>
              )}
              {/* STEP COUNT + CRITICAL */}
              <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                <Tag c="dm">{sop.steps.length} steps</Tag>
                {sop.steps.filter(s=>s.critical).length>0&&<Tag c="rd">{sop.steps.filter(s=>s.critical).length} critical</Tag>}
                <Tag c="dm">{sop.attachments.length} docs</Tag>
              </div>
              {/* ACTIONS */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <Btn xs c="gd" onClick={()=>setSelSop(sop.id)}>▷ Execute SOP</Btn>
                {doc&&<Btn xs c="bl" onClick={()=>openFile&&openFile(doc)}>📄 View Document</Btn>}
                <Btn xs c="out" onClick={()=>addToast&&addToast(`${sop.id} — printed`,"ok")}>🖨</Btn>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SOPPanel(){
  const INIT=[
    {txt:"Pre-cut fabric inspection — face/back ID",done:true,by:"H.Duc 08:30",req:true},
    {txt:"Lay plan verification — grain alignment ≤2°",done:true,by:"H.Duc 08:45",req:true},
    {txt:"Marker efficiency check — target ≥85%",done:true,by:"System 09:01",req:true},
    {txt:"Cutting table calibration sign-off",done:true,by:"QC P.Nam 09:10",req:true},
    {txt:"Perimeter cutting — tolerance ±1mm",done:false,by:null,req:true},
    {txt:"Notch marking accuracy check",done:false,by:null,req:true},
    {txt:"Bundle labelling with LOT UID barcode",done:false,by:null,req:true},
    {txt:"QC Gate sign-off before transfer to Print",done:false,by:null,req:true},
  ];
  const [steps,setSteps]=useState(INIT);
  const [toast,setToast]=useState(null);
  const toggle=(i)=>{
    const now=new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});
    setSteps(prev=>prev.map((s,idx)=>idx===i?{...s,done:!s.done,by:!s.done?"Operator "+now:null}:s));
    setToast(!steps[i].done?"Confirmed: "+steps[i].txt.slice(0,35)+"…":"Unchecked: "+steps[i].txt.slice(0,35)+"…");
    setTimeout(()=>setToast(null),3000);
  };
  const doneCount=steps.filter(s=>s.done).length;
  const pct=Math.round((doneCount/steps.length)*100);
  const canAdvance=doneCount===steps.length;
  return(
    <div className="card">
      <div className="card-h">
        <div>
          <div className="card-t">SOP Digital Checklist — Interactive</div>
          <div style={{fontSize:11,color:C.textMid,marginTop:2}}>PRD-000821 · Op 0010 — Fabric Cutting</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:C.gold}}>{doneCount}/{steps.length}</span>
          <Tag c="gd">Stage 2/6</Tag>
        </div>
      </div>
      <div style={{padding:"8px 16px 4px"}}>
        <Bar v={pct} col={canAdvance?C.green:C.gold} tall/>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:C.textDim,textAlign:"right",marginTop:2,marginBottom:4}}>{pct}% complete</div>
      </div>
      <div className="card-b" style={{padding:"0 16px 12px"}}>
        {steps.map((s,i)=>(
          <div key={i} onClick={()=>toggle(i)}
            style={{display:"flex",gap:10,padding:"9px 4px",borderBottom:"1px solid "+C.border+"18",alignItems:"flex-start",cursor:"pointer",borderRadius:4,transition:"background .1s"}}>
            <div style={{width:18,height:18,borderRadius:3,
              border:"1px solid "+(s.done?C.green:C.borderHi),
              background:s.done?C.green+"20":"transparent",
              display:"flex",alignItems:"center",justifyContent:"center",
              flexShrink:0,marginTop:1,transition:"all .15s"}}>
              {s.done&&<span style={{color:C.green,fontSize:11}}>✓</span>}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:s.done?C.textMid:C.text,textDecoration:s.done?"line-through":"none"}}>{s.txt}</div>
              {s.by&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:C.textDim,marginTop:2}}>Confirmed: {s.by}</div>}
            </div>
            {s.req&&!s.done&&<Tag c="am">Required</Tag>}
          </div>
        ))}
        {toast&&<div style={{marginTop:8,padding:"8px 12px",background:C.greenDim,border:"1px solid "+C.green+"33",borderRadius:4,fontFamily:"'DM Mono',monospace",fontSize:10,color:C.green}}>{toast}</div>}
        <div style={{marginTop:12}} className={canAdvance?"infobox ok":"infobox warn"}>
          {canAdvance?"All steps complete — Stage can advance to Print Station.":steps.filter(s=>!s.done).length+" steps pending. Click each step to confirm. Stage locked until complete."}
        </div>
        {canAdvance&&<div style={{marginTop:8}}><Btn c="gr">Advance to Print Station</Btn></div>}
      </div>
    </div>
  );
}

function CreateModal({type,onClose,onSuccess}){
  if(!type||!MCFG[type])return null;
  const cfg=MCFG[type];
  const [vals,setVals]=useState({});
  const [saving,setSaving]=useState(false);
  const [errors,setErrors]=useState({});
  const set=(id,v)=>setVals(p=>({...p,[id]:v}));
  const validate=()=>{
    const e={};
    cfg.fields.filter(f=>f.req).forEach(f=>{ if(!vals[f.id]) e[f.id]="Required"; });
    setErrors(e);
    return Object.keys(e).length===0;
  };
  const submit=()=>{
    if(!validate())return;
    setSaving(true);
    setTimeout(()=>{ setSaving(false); onSuccess(type,vals); onClose(); },900);
  };
  return(
    <div className="overlay" onClick={e=>{ if(e.target===e.currentTarget)onClose(); }}>
      <div className="modal">
        <div className="modal-h">
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>{cfg.icon}</span>
            <div>
              <div className="modal-t">{cfg.title}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:C.textDim,marginTop:2}}>{cfg.sub}</div>
            </div>
          </div>
          <div style={{cursor:"pointer",color:C.textDim,fontSize:16,padding:"0 4px"}} onClick={onClose}>✕</div>
        </div>
        <div className="modal-b">
          {cfg.fields.map(f=>(
            <div key={f.id} className="form-row">
              <div className="form-lbl">
                {f.label}{f.req&&<span style={{color:C.red}}> *</span>}
                {errors[f.id]&&<span style={{color:C.red,marginLeft:8,fontSize:8}}>— {errors[f.id]}</span>}
              </div>
              {f.t==="sel"?(
                <select className="inp" style={{borderColor:errors[f.id]?C.red:""}} value={vals[f.id]||""} onChange={e=>set(f.id,e.target.value)}>
                  <option value="">— Select —</option>
                  {f.opts.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              ):f.t==="date"?(
                <input className="inp" type="date" style={{borderColor:errors[f.id]?C.red:""}} value={vals[f.id]||""} onChange={e=>set(f.id,e.target.value)}/>
              ):(
                <input className="inp" type={f.t||"text"} placeholder={f.ph||""} style={{borderColor:errors[f.id]?C.red:""}} value={vals[f.id]||""} onChange={e=>set(f.id,e.target.value)}/>
              )}
            </div>
          ))}
        </div>
        <div className="modal-f">
          <Btn c="out" onClick={onClose}>Cancel</Btn>
          <Btn c="gd" onClick={submit}>{saving?"⏳ Saving…":"Create "+cfg.title.split(" ").slice(1).join(" ")}</Btn>
        </div>
      </div>
    </div>
  );
}

function PasswordForm({addToast}){
  const [vals,setVals]=useState({old:"",nw:"",confirm:""});
  const [err,setErr]=useState("");
  const set=(k,v)=>setVals(p=>({...p,[k]:v}));
  const submit=()=>{
    if(!vals.old||!vals.nw||!vals.confirm){setErr("Vui lòng điền đầy đủ thông tin.");return;}
    if(vals.nw!==vals.confirm){setErr("Mật khẩu mới không khớp.");return;}
    if(vals.nw.length<8){setErr("Mật khẩu phải có ít nhất 8 ký tự.");return;}
    setErr("");
    addToast("Mật khẩu đã được cập nhật","ok");
    setVals({old:"",nw:"",confirm:""});
  };
  return(
    <div>
      <div className="pf-row">
        <div className="pf-field"><div className="pf-field-lbl">Mật khẩu hiện tại</div><input className="inp" type="password" value={vals.old} onChange={e=>set("old",e.target.value)} placeholder="••••••••"/></div>
      </div>
      <div className="pf-row">
        <div className="pf-field"><div className="pf-field-lbl">Mật khẩu mới</div><input className="inp" type="password" value={vals.nw} onChange={e=>set("nw",e.target.value)} placeholder="Tối thiểu 8 ký tự"/></div>
        <div className="pf-field"><div className="pf-field-lbl">Xác nhận mật khẩu mới</div><input className="inp" type="password" value={vals.confirm} onChange={e=>set("confirm",e.target.value)} placeholder="••••••••"/></div>
      </div>
      {err&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:C.red,marginBottom:8}}>⚠ {err}</div>}
      <Btn c="gd" onClick={submit}>Cập nhật mật khẩu</Btn>
    </div>
  );
}

// ── TOAST ────────────────────────────────────────────────────────
function Toast({items}){
  if(!items||!items.length)return null;
  return(
    <div style={{position:"fixed",bottom:24,right:24,zIndex:200,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
      {items.map((t,i)=>(
        <div key={t.id} style={{padding:"10px 16px",
          background:t.tp==="ok"?C.greenDim:t.tp==="err"?C.redDim:C.bg3,
          border:"1px solid "+(t.tp==="ok"?C.green:t.tp==="err"?C.red:C.gold)+"44",
          borderRadius:6,fontFamily:"'DM Mono',monospace",fontSize:10,
          color:t.tp==="ok"?C.green:t.tp==="err"?C.red:C.goldBright,
          boxShadow:"0 4px 20px rgba(0,0,0,.5)",maxWidth:340,animation:"slideIn .2s ease-out"}}>
          {t.tp==="ok"?"✓ ":t.tp==="err"?"✕ ":"⚡ "}{t.msg}
        </div>
      ))}
    </div>
  );
}
