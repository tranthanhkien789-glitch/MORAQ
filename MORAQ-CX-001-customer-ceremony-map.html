<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="color-scheme" content="dark">
<title>MORAQ Customer Ceremony Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0C0B0A!important;color:#fff!important;height:100%}
.shell{position:fixed;inset:0;background:#0C0B0A;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;overflow:hidden}

/* TOP */
.top{height:50px;flex-shrink:0;background:#111010;border-bottom:1px solid #242220;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:50}
.t-l{display:flex;align-items:center;gap:12px}
.t-brand{font-family:'Menlo','Monaco','Courier New',monospace;font-size:10px;letter-spacing:.2em;color:#9FE1CB;opacity:.8}
.t-sep{width:1px;height:14px;background:#2A2724}
.t-title{font-family:'Georgia','Times New Roman',serif;font-size:13px;font-style:italic;color:rgba(255,255,255,.35)}
.t-doc{font-family:'Menlo','Monaco','Courier New',monospace;font-size:8px;color:rgba(255,255,255,.2)}

/* STAGE TABS — horizontal scroll */
.stage-rail{
  height:42px;flex-shrink:0;background:#0E0D0C;
  border-bottom:1px solid #242220;
  display:flex;overflow-x:auto;scrollbar-width:none;align-items:stretch;
}
.stage-rail::-webkit-scrollbar{display:none}
.stab{
  display:flex;align-items:center;gap:8px;padding:0 16px;
  cursor:pointer;flex-shrink:0;border-bottom:2px solid transparent;
  transition:all .18s;user-select:none;
}
.stab-num{font-family:'Menlo','Monaco','Courier New',monospace;font-size:9px;letter-spacing:.08em;color:rgba(255,255,255,.2)}
.stab-lbl{font-family:'Menlo','Monaco','Courier New',monospace;font-size:8px;letter-spacing:.08em;color:rgba(255,255,255,.28);white-space:nowrap}
.stab:hover .stab-lbl{color:rgba(255,255,255,.55)}
.stab.on .stab-lbl,.stab.on .stab-num{color:#fff}
.stab.on{border-bottom-color:var(--sc)}

/* MAIN AREA */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* JOURNEY HEADER */
.journey-header{height:52px;flex-shrink:0;display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #1A1918;background:#0A0908}
.journey-header::-webkit-scrollbar{display:none}
.jh-stage{display:flex;flex-direction:column;justify-content:center;padding:0 16px;border-right:1px solid #1A1918;min-width:160px;cursor:pointer;transition:background .15s;user-select:none}
.jh-stage:last-child{border-right:none}
.jh-stage:hover{background:#111010}
.jh-stage.active-s{background:#141210;border-bottom:2px solid var(--sc)}
.jhs-num{font-family:'Menlo','Monaco','Courier New',monospace;font-size:7px;letter-spacing:.1em;color:rgba(255,255,255,.2);margin-bottom:3px}
.jhs-name{font-family:'Georgia','Times New Roman',serif;font-size:13px;color:rgba(255,255,255,.55);line-height:1.2}
.jh-stage.active-s .jhs-name{color:#fff}
.jhs-count{font-family:'Menlo','Monaco','Courier New',monospace;font-size:7px;color:rgba(255,255,255,.18);margin-top:2px}

/* CONTENT AREA — split */
.content-area{flex:1;display:flex;overflow:hidden}

/* MOMENT LIST */
.moment-list{width:260px;flex-shrink:0;border-right:1px solid #242220;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#2A2724 transparent;background:#0E0D0C}
.moment-list::-webkit-scrollbar{width:3px}
.moment-list::-webkit-scrollbar-thumb{background:#2A2724}
.ml-stage-header{padding:10px 14px 8px;border-bottom:1px solid #1A1918;position:sticky;top:0;background:#0E0D0C;z-index:5}
.mlsh-label{font-family:'Menlo','Monaco','Courier New',monospace;font-size:7px;letter-spacing:.12em;color:rgba(255,255,255,.22);display:block;margin-bottom:4px}
.mlsh-name{font-family:'Georgia','Times New Roman',serif;font-size:15px;color:#fff}
.moment-item{padding:12px 14px;border-bottom:1px solid #1A1918;cursor:pointer;transition:background .15s;border-left:3px solid transparent;user-select:none}
.moment-item:hover{background:#141210}
.moment-item.on{background:#1A1916;border-left-color:var(--sc)}
.mi-time{font-family:'Menlo','Monaco','Courier New',monospace;font-size:8px;letter-spacing:.06em;color:rgba(255,255,255,.22);margin-bottom:4px}
.moment-item.on .mi-time{color:var(--sc)}
.mi-name{font-size:12.5px;color:rgba(255,255,255,.6);line-height:1.3;font-weight:500;margin-bottom:4px}
.moment-item.on .mi-name{color:#fff}
.mi-senses{display:flex;gap:3px;flex-wrap:wrap}
.ms{font-family:'Menlo','Monaco','Courier New',monospace;font-size:6.5px;padding:1.5px 5px;border-radius:8px}

/* MOMENT DETAIL */
.moment-detail{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#2A2724 transparent;background:#0C0B0A}
.moment-detail::-webkit-scrollbar{width:3px}
.moment-detail::-webkit-scrollbar-thumb{background:#2A2724}
.md-empty{display:flex;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,.2);font-family:'Georgia','Times New Roman',serif;font-size:16px;font-style:italic}
.md-content{padding:22px;display:flex;flex-direction:column;gap:14px}

/* DETAIL HEADER */
.dh{display:flex;flex-direction:column;gap:5px;padding-bottom:14px;border-bottom:1px solid #242220}
.dh-stage{font-family:'Menlo','Monaco','Courier New',monospace;font-size:7px;letter-spacing:.14em;color:var(--sc,#9FE1CB)}
.dh-time{font-family:'Menlo','Monaco','Courier New',monospace;font-size:8px;letter-spacing:.06em;color:rgba(255,255,255,.3)}
.dh-name{font-family:'Georgia','Times New Roman',serif;font-size:clamp(20px,3.5vw,30px);font-weight:300;line-height:.97;color:#fff}
.dh-name em{font-style:italic}
.dh-senses{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}

/* DETAIL SECTIONS */
.dsec{background:#1A1916;border:1px solid #2A2724;border-radius:6px;overflow:hidden}
.dsec-header{background:#141210;padding:9px 13px;border-bottom:1px solid #242220}
.dsech{font-family:'Menlo','Monaco','Courier New',monospace;font-size:7px;letter-spacing:.12em;color:rgba(255,255,255,.3)}
.dsec-body{padding:12px 13px;display:flex;flex-direction:column;gap:8px}
.ds-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #1A1918;align-items:flex-start}
.ds-row:last-child{border-bottom:none}
.ds-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center;margin-top:1px}
.ds-text{flex:1;font-size:12px;color:rgba(255,255,255,.58);line-height:1.65}
.ds-text b{color:rgba(255,255,255,.85);font-weight:400}

/* EMOTION BAR */
.emotion-bar{display:flex;flex-direction:column;gap:6px}
.eb-label{font-family:'Menlo','Monaco','Courier New',monospace;font-size:7px;letter-spacing:.1em;color:rgba(255,255,255,.25);margin-bottom:2px}
.eb-track{height:6px;background:#242220;border-radius:3px;overflow:hidden}
.eb-fill{height:100%;border-radius:3px;transition:width .5s}
.eb-desc{font-size:11px;color:rgba(255,255,255,.38);font-style:italic;margin-top:2px}

/* FAILURE / SUCCESS */
.fs-split{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fs-card{border-radius:5px;padding:10px;display:flex;flex-direction:column;gap:5px}
.fs-card.fail{background:#1A1010;border:1px solid #3A1A1A}
.fs-card.win{background:#0A1610;border:1px solid #1A3A1A}
.fs-label{font-family:'Menlo','Monaco','Courier New',monospace;font-size:6.5px;letter-spacing:.1em;display:block;margin-bottom:3px}
.fs-card.fail .fs-label{color:rgba(163,45,45,.6)}
.fs-card.win .fs-label{color:rgba(15,110,86,.8)}
.fs-text{font-size:11px;line-height:1.6}
.fs-card.fail .fs-text{color:rgba(255,255,255,.42)}
.fs-card.win .fs-text{color:rgba(255,255,255,.58)}

/* MORAQ ACTION */
.action-card{background:#080F0C;border:1px solid rgba(15,110,86,.2);border-left:2px solid #0F6E56;border-radius:0 6px 6px 0;padding:12px;display:flex;flex-direction:column;gap:6px}
.ac-label{font-family:'Menlo','Monaco','Courier New',monospace;font-size:7px;letter-spacing:.12em;color:#9FE1CB;display:block;margin-bottom:3px}
.ac-item{display:flex;gap:8px;font-size:12px;color:rgba(255,255,255,.58);line-height:1.6;align-items:baseline}
.ac-dot{width:4px;height:4px;border-radius:50%;background:#0F6E56;flex-shrink:0;margin-top:6px}

/* STAGE COLORS */
:root{
  --s1:#0F6E56;--s2:#854F0B;--s3:#185FA5;
  --s4:#533CB7;--s5:#3B6D11;--s6:#C8A84B;
}

/* Sense tags */
.ss-scent{background:#0A1E14;color:#9FE1CB}
.ss-sound{background:#08101C;color:#85B7EB}
.ss-light{background:#160C02;color:#FAC775}
.ss-touch{background:#0A1406;color:#C0DD97}
.ss-visual{background:#0C0A20;color:#AFA9EC}
.ss-emotion{background:#1A0E14;color:#F0A0C0}

/* MOBILE: stack layout */
@media(max-width:640px){
  .journey-header{display:none}
  .content-area{flex-direction:column}
  .moment-list{width:100%;max-height:200px;border-right:none;border-bottom:1px solid #242220}
  .moment-detail{flex:1}
}
</style>
</head>
<body>
<div class="shell">

<div class="top">
  <div class="t-l">
    <div class="t-brand">MORAQ</div>
    <div class="t-sep"></div>
    <div class="t-title">Customer Ceremony Map</div>
  </div>
  <div class="t-doc">CCM-001 · 6 STAGES · 26 MOMENTS</div>
</div>

<!-- STAGE SELECTOR -->
<div class="stage-rail" id="stageRail">
  <div class="stab on" data-s="0" style="--sc:var(--s1)"><div class="stab-num">01</div><div class="stab-lbl">DISCOVERY</div></div>
  <div class="stab" data-s="1" style="--sc:var(--s2)"><div class="stab-num">02</div><div class="stab-lbl">ARRIVAL</div></div>
  <div class="stab" data-s="2" style="--sc:var(--s3)"><div class="stab-num">03</div><div class="stab-lbl">IN-STORE JOURNEY</div></div>
  <div class="stab" data-s="3" style="--sc:var(--s4)"><div class="stab-num">04</div><div class="stab-lbl">POST-PURCHASE</div></div>
  <div class="stab" data-s="4" style="--sc:var(--s5)"><div class="stab-num">05</div><div class="stab-lbl">RETURN</div></div>
  <div class="stab" data-s="5" style="--sc:var(--s6)"><div class="stab-num">06</div><div class="stab-lbl">ADVOCACY</div></div>
</div>

<div class="main">

  <div class="content-area">
    <!-- MOMENT LIST -->
    <div class="moment-list" id="momentList"></div>
    <!-- MOMENT DETAIL -->
    <div class="moment-detail" id="momentDetail">
      <div class="md-empty">Chọn một moment để xem chi tiết →</div>
    </div>
  </div>

</div>
</div>

<script>
// ── DATA ──
const STAGES = [
  {
    id:0, color:'var(--s1)', label:'STAGE 01', name:'Discovery', count:'5 moments',
    moments:[
      {
        time:'Ngày 0 — Online',
        name:'Lần đầu thấy MORAQ',
        em:'',
        senses:['visual','emotion'],
        emotion:{label:'Tò mò nhẹ',value:30,desc:'Scroll qua, dừng lại 2 giây. Chưa có ý định gì.'},
        customer:[
          {icon:'👁','text':'Nhìn thấy một post trên Instagram hoặc TikTok — <b>không phải quảng cáo, là organic content của ai đó đang dùng MORAQ.</b>'},
          {icon:'📱','text':'Caption có chiều sâu, ảnh tối và warm. Không có chai hoàn hảo trên nền trắng. Có bàn tay người trong khung.'},
          {icon:'❓','text':'Tự hỏi: "Đây là brand gì? Việt Nam à?" — nhưng chưa đủ tò mò để search ngay. Lưu post hoặc follow account.'},
        ],
        moraq:[
          'Post phải đủ tốt để stop scroll — nhưng không phải vì aggressive, mà vì <b>genuinely interesting</b>.',
          'Caption kết thúc bằng câu hỏi — tạo ra một thought mà người xem mang theo.',
          'Không có CTA, không có price tag. Chỉ có một world đủ hấp dẫn để muốn biết thêm.',
        ],
        fail:'Post quá promotional, quá perfect, hoặc quá generic → bị scroll qua không dừng lại',
        win:'Khách lưu post hoặc follow account — đây là signal of interest, không phải intent to buy',
      },
      {
        time:'Ngày 1–7 — Research phase',
        name:'Chủ động tìm hiểu',
        senses:['visual','emotion'],
        emotion:{label:'Quan tâm thật sự',value:55,desc:'Đang tìm hiểu một cách chủ động. Intent đang hình thành.'},
        customer:[
          {icon:'🔍','text':'Search "MORAQ fragrance", đọc captions cũ, xem tagged location, tìm review nếu có.'},
          {icon:'📖','text':'<b>Đọc Brand Philosophy nếu có trên website.</b> Người ở giai đoạn này muốn biết "brand này là ai" trước khi đến store.'},
          {icon:'💭','text':'Tự hỏi: "Liệu mình có phải type của họ không?" — MORAQ đã planted seed về identity match.'},
        ],
        moraq:[
          'Profile Instagram phải <b>coherent và deep</b> — scroll 9 posts đầu phải cho thấy một thế giới nhất quán.',
          'Bio không nên list products — nên articulate philosophy trong 2 câu.',
          'Không reply DM "vâng bạn ơi shop mở 10h-21h" — reply như người của MORAQ nói chuyện.',
        ],
        fail:'Profile không có depth, bio quá generic, không có philosophy → không đủ để tạo thành "tôi phải đến thử"',
        win:'Khách DM hỏi địa chỉ hoặc giờ mở cửa — đây là intent rõ ràng, sắp convert',
      },
      {
        time:'Ngày 3–14 — Planning',
        name:'Quyết định đến thử',
        senses:['emotion'],
        emotion:{label:'Anticipation',value:65,desc:'Đã quyết định sẽ đến. Đang plan thời gian và lý do.'},
        customer:[
          {icon:'📍','text':'Kiểm tra địa chỉ, giờ mở cửa. Có thể check xem ai đã đến trên Google Maps hoặc Instagram location.'},
          {icon:'🤔','text':'Tạo ra <b>"lý do" để đi</b> — tặng quà, tìm hương mới, đơn giản là tò mò. Người ta cần một lý do hợp lý hóa việc đến một boutique nhỏ.'},
          {icon:'👥','text':'Có thể rủ bạn bè hoặc đi một mình. <b>Solo visitor thường có intent to buy cao hơn — họ đến vì bản thân, không phải vì bạn bè muốn đi.</b>'},
        ],
        moraq:[
          'Google Business profile phải accurate và có ít nhất vài reviews thật.',
          'Nếu khách DM hỏi "có nên mang gì theo không?" — đây là golden opportunity để set expectation đúng.',
          'Không cần hỏi "bạn thích loại hương nào?" qua DM — đó là conversation cho counter.',
        ],
        fail:'Địa chỉ sai trên Google Maps, giờ mở cửa không update → first bad experience trước khi đến store',
        win:'Khách đang trên đường đến. Tất cả những gì xảy ra từ đây trở đi là real-time ceremony.',
      },
    ]
  },
  {
    id:1, color:'var(--s2)', label:'STAGE 02', name:'Arrival', count:'4 moments',
    moments:[
      {
        time:'T-5 phút — Đang đến',
        name:'Nhìn thấy store từ xa',
        senses:['visual','emotion'],
        emotion:{label:'Phấn khích + hồi hộp',value:72,desc:'Sắp trải nghiệm thứ gì đó mà mình đã research. Expectation cao.'},
        customer:[
          {icon:'🏠','text':'Nhìn thấy store từ xa — exterior design tạo ra impression đầu tiên vật lý. <b>Facade, signage, ánh sáng từ bên trong nhìn qua cửa kính.</b>'},
          {icon:'👁','text':'Nhìn qua cửa kính: thấy gì trong 3 giây đầu? Counter có visible không? Có đủ "luxury cue" không?'},
          {icon:'😊','text':'Cảm giác "đây đúng rồi" hoặc "hơi khác với mình tưởng" — cả hai đều OK nếu experience sau đó tốt.'},
        ],
        moraq:[
          '<b>Exterior và cửa kính phải maintained</b> — sạch, không sticker cũ, ánh sáng trong store visible từ ngoài.',
          'Counter phải visible trong 3 giây từ cửa — đây là "visual gravity" check.',
          'Không có sale banner, không có A-frame với discount percentage trước cửa.',
        ],
        fail:'Store trông "bình thường" từ ngoài — mất expectation trước khi vào',
        win:'Khách dừng lại nhìn qua cửa kính vài giây trước khi vào — sign of genuine interest',
      },
      {
        time:'T=0 — Cánh cửa',
        name:'Tay chạm cửa, bước qua ngưỡng',
        senses:['touch','scent','light','sound'],
        emotion:{label:'Threshold moment',value:78,desc:'Khoảnh khắc chuyển đổi từ thế giới bên ngoài vào thế giới của MORAQ.'},
        customer:[
          {icon:'✋','text':'<b>Tay cầm door handle</b> — âm thanh và texture của cửa là haptic cue đầu tiên.'},
          {icon:'👃','text':'Cửa mở: <b>làn hương Zone 1 chạm khứu giác ngay lập tức</b>. Hệ limbic xử lý trước khi ý thức nhận ra. Ấn tượng đầu tiên đã xảy ra.'},
          {icon:'💡','text':'Mắt chuyển từ ánh sáng ngoài trời (5500K) sang 2700K warm. 2–3 giây để adjust. Counter bắt đầu hiện ra.'},
          {icon:'🎵','text':'72–78 BPM bắt đầu thấm vào — không conscious nhưng nhịp tim đang sync.'},
        ],
        moraq:[
          'Zone 1 diffuser phải active đúng giờ — <b>không có trường hợp khách vào mà không có ambient scent.</b>',
          'Door handle phải clean. Không fingerprint, không sticker, không creak.',
          'Staff không được rush đến ngay — 60 giây observe protocol bắt đầu.',
        ],
        fail:'Diffuser chưa warm up, không có scent khi khách vào → mất khoảnh khắc quan trọng nhất',
        win:'Khách dừng lại ngay sau khi bước vào, thở sâu — đây là unconscious response to scent. Ceremony đã bắt đầu.',
      },
      {
        time:'T+8s đến T+60s — Exploration',
        name:'60 giây của riêng khách',
        senses:['visual','scent','sound','touch'],
        emotion:{label:'Orientation + wonder',value:80,desc:'Đang absorb không gian. Não đang xử lý và categorize: "đây là nơi như thế nào?"'},
        customer:[
          {icon:'👀','text':'Mắt dẫn về counter trong 3 giây (nếu layout đúng). Bắt đầu scan display từ trái sang phải — Scent Grammar order.'},
          {icon:'✋','text':'Có thể cầm một chai lên — <b>weight, texture, nhiệt độ của glass</b>. Đây là moment của haptic luxury.'},
          {icon:'👃','text':'Sau 30 giây, bắt đầu nhận thức được ambient scent: "ở đây có mùi dễ chịu."'},
          {icon:'🎵','text':'Bước chân trên sàn đá/gỗ tạo âm thanh trầm. Nhạc đủ để fill silence, không đủ để distract.'},
        ],
        moraq:[
          '<b>Staff không tiếp cận trong 60 giây đầu.</b> Đứng quan sát từ ≥2m. Không eye contact quá nhiều — tạo áp lực.',
          'Tất cả visual phải sẵn sàng: planogram đúng, negative space đủ, không có chai bị lệch.',
          'Observe xem khách dừng ở đâu — đây là data cho cuộc tư vấn tiếp theo.',
        ],
        fail:'Staff tiếp cận ngay hoặc nói "em chào anh/chị" to — phá vỡ 60 giây quý giá của khách',
        win:'Khách cầm chai lên và không đặt xuống ngay — họ đang connect. Đây là tín hiệu tiếp cận.',
      },
    ]
  },
  {
    id:2, color:'var(--s3)', label:'STAGE 03', name:'In-Store Journey', count:'7 moments',
    moments:[
      {
        time:'T+60s — Tiếp cận',
        name:'"Bạn đang tìm hương cho dịp nào?"',
        senses:['sound','visual'],
        emotion:{label:'Welcomed, not hunted',value:75,desc:'Cảm thấy được mời vào cuộc trò chuyện, không phải bị approach để bán hàng.'},

// ── STATE ──
let curStage = 0;
let curMoment = null;

// ── RENDER MOMENT LIST ──
function renderMomentList(stageIdx) {
  const stage = STAGES[stageIdx];
  const sc = ['var(--s1)','var(--s2)','var(--s3)','var(--s4)','var(--s5)','var(--s6)'][stageIdx];
  const list = document.getElementById('momentList');
  list.innerHTML = `
    <div class="ml-stage-header">
      <span class="mlsh-label" style="color:${sc}">${stage.label}</span>
      <div class="mlsh-name">${stage.name}</div>
    </div>
  `;
  stage.moments.forEach((m,i) => {
    const senseHTML = (m.senses||[]).map(s => {
      const map = {scent:'ss-scent',sound:'ss-sound',light:'ss-light',touch:'ss-touch',visual:'ss-visual',emotion:'ss-emotion'};
      const labels = {scent:'SCENT',sound:'SOUND',light:'LIGHT',touch:'TOUCH',visual:'VISUAL',emotion:'CẢMXÚC'};
      return `<span class="ms ${map[s]||''}">${labels[s]||s}</span>`;
    }).join('');
    const div = document.createElement('div');
    div.className = 'moment-item';
    div.style.setProperty('--sc', sc);
    div.dataset.mi = i;
    div.innerHTML = `
      <div class="mi-time">${m.time}</div>
      <div class="mi-name">${m.name}</div>
      <div class="mi-senses">${senseHTML}</div>
    `;
    div.addEventListener('click', () => selectMoment(stageIdx, i));
    list.appendChild(div);
  });
}

// ── RENDER MOMENT DETAIL ──
function selectMoment(stageIdx, momentIdx) {
  curMoment = momentIdx;
  const stage = STAGES[stageIdx];
  const m = stage.moments[momentIdx];
  const sc = ['var(--s1)','var(--s2)','var(--s3)','var(--s4)','var(--s5)','var(--s6)'][stageIdx];

  // Update list selection
  document.querySelectorAll('.moment-item').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.moment-item')[momentIdx]?.classList.add('on');

  const senseHTML = (m.senses||[]).map(s => {
    const map = {scent:'ss-scent',sound:'ss-sound',light:'ss-light',touch:'ss-touch',visual:'ss-visual',emotion:'ss-emotion'};
    const labels = {scent:'SCENT',sound:'SOUND',light:'LIGHT',touch:'TOUCH',visual:'VISUAL',emotion:'CẢM XÚC'};
    return `<span class="ms ${map[s]||''}" style="font-size:8px;padding:2px 8px;border-radius:10px">${labels[s]||s}</span>`;
  }).join('');

  const customerRows = (m.customer||[]).map(c =>
    `<div class="ds-row"><div class="ds-icon">${c.icon}</div><div class="ds-text">${c.text}</div></div>`
  ).join('');

  const moraqRows = (m.moraq||[]).map(a =>
    `<div class="ac-item"><div class="ac-dot"></div><div>${a}</div></div>`
  ).join('');

  const detail = document.getElementById('momentDetail');
  detail.innerHTML = `
    <div class="md-content">
      <div class="dh">
        <div class="dh-stage" style="color:${sc}">${stage.label} · ${stage.name}</div>
        <div class="dh-time" style="color:rgba(255,255,255,.3)">${m.time}</div>
        <div class="dh-name">${m.name}</div>
        <div class="dh-senses">${senseHTML}</div>
      </div>

      <div class="dsec">
        <div class="dsec-header"><div class="dsech">CUSTOMER EXPERIENCE — HỌ ĐANG THẤY · NGHE · CẢM NHẬN</div></div>
        <div class="dsec-body">${customerRows}</div>
      </div>

      <div class="emotion-bar" style="padding:0">
        <div class="card-sm-eb" style="background:#1A1916;border:1px solid #2A2724;border-radius:6px;padding:12px">
          <div style="font-family:'Menlo','Monaco','Courier New',monospace;font-size:7px;letter-spacing:.1em;color:rgba(255,255,255,.3);margin-bottom:8px">EMOTIONAL STATE</div>
          <div style="font-family:'Georgia','Times New Roman',serif;font-size:15px;color:${sc};margin-bottom:8px">${m.emotion?.label||'—'}</div>
          <div style="height:5px;background:#242220;border-radius:3px;overflow:hidden;margin-bottom:6px">
            <div style="width:${m.emotion?.value||0}%;height:100%;background:${sc};border-radius:3px;transition:width .6s"></div>
          </div>
          <div style="font-size:11px;color:rgba(255,255,255,.38);font-style:italic">${m.emotion?.desc||''}</div>
        </div>
      </div>

      <div class="action-card">
        <span class="ac-label">MORAQ THỰC HIỆN</span>
        ${moraqRows}
      </div>

      <div class="fs-split">
        <div class="fs-card fail">
          <span class="fs-label">✗ FAILURE POINT</span>
          <div class="fs-text">${m.fail||'—'}</div>
        </div>
        <div class="fs-card win">
          <span class="fs-label">✓ SUCCESS SIGNAL</span>
          <div class="fs-text">${m.win||'—'}</div>
        </div>
      </div>
    </div>
  `;
  detail.scrollTop = 0;
}

// ── SWITCH STAGE ──
function switchStage(idx) {
  curStage = idx;
  curMoment = null;
  const sc = ['var(--s1)','var(--s2)','var(--s3)','var(--s4)','var(--s5)','var(--s6)'][idx];
  document.querySelectorAll('.stab').forEach((t,i) => {
    t.classList.toggle('on', i===idx);
    t.style.setProperty('--sc', ['var(--s1)','var(--s2)','var(--s3)','var(--s4)','var(--s5)','var(--s6)'][i]);
  });
  renderMomentList(idx);
  document.getElementById('momentDetail').innerHTML = `<div class="md-empty">Chọn một moment để xem chi tiết →</div>`;
  document.querySelectorAll('.stab')[idx].scrollIntoView({behavior:'smooth',inline:'nearest',block:'nearest'});
}

// ── INIT ──
document.querySelectorAll('.stab').forEach((t,i) => t.addEventListener('click', () => switchStage(i)));
renderMomentList(0);

// Swipe on moment list
let tx=0;
document.getElementById('momentList').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById('momentList').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>60)switchStage(dx<0?Math.min(curStage+1,5):Math.max(curStage-1,0));
},{passive:true});
</script>
